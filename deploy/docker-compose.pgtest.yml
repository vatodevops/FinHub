services:
  postgres:
    image: postgres:16
    container_name: finhub-pgtest-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: finhub
      POSTGRES_USER: finhub
      POSTGRES_PASSWORD: finhub_pgtest
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finhub -d finhub"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: finhub-pgtest-backend
    restart: unless-stopped
    environment:
      APP_NAME: FinHub API
      ENVIRONMENT: production
      DATABASE_URL: postgresql+psycopg://finhub:finhub_pgtest@postgres:5432/finhub
      CORS_ORIGINS: '["https://finhub.vatotech.es"]'
      GOCARDLESS_REDIRECT_URI: https://finhub.vatotech.es/connectors/gocardless/callback
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "-lc", "alembic upgrade head && python -m app.db.seed && uvicorn app.main:app --host 0.0.0.0 --port 8081"]
    ports:
      - "127.0.0.1:18082:8081"
