name: Deploy production

on:
  push:
    tags:
      - 'promote-*'
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref a desplegar en producción
        required: true
        type: string

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve ref
        id: ref
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "ref=${{ inputs.git_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy production on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.FINHUB_VPS_HOST }}
          username: ${{ secrets.FINHUB_VPS_USER }}
          port: ${{ secrets.FINHUB_VPS_PORT }}
          key: ${{ secrets.FINHUB_VPS_SSH_KEY }}
          script: |
            cd /root/FinHub
            bash deploy/scripts/vps-deploy-prod.sh "${{ steps.ref.outputs.ref }}"

